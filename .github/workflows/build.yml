name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libsdl3-dev libglew-dev libopenal-dev libglu1-mesa-dev \
            libvorbis-dev zlib1g-dev pkg-config cmake g++

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist/torch-linux
          cp build/torch build/torch_server dist/torch-linux/
          cp -r data dist/torch-linux/
          tar czf torch-linux.tar.gz -C dist torch-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: torch-linux
          path: torch-linux.tar.gz

  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            mingw-w64 cmake pkg-config

      - name: Configure (cross-compile)
        run: >
          cmake -B build-win
          -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-mingw64.cmake
          -DCMAKE_BUILD_TYPE=Release
          -DSDL3_LIBRARY=/usr/x86_64-w64-mingw32/lib/libSDL3.dll.a
          -DSDL3_INCLUDE_DIR=/usr/x86_64-w64-mingw32/include/SDL3
          -DOPENGL_LIBRARY=/usr/x86_64-w64-mingw32/lib/libopengl32.a
          -DGLEW_LIBRARY=/usr/x86_64-w64-mingw32/lib/libglew32.a
          -DGLEW_INCLUDE_DIR=/usr/x86_64-w64-mingw32/include/GL
          -DOPENAL_LIBRARY=/usr/x86_64-w64-mingw32/lib/libopenal32.dll.a
          -DOPENAL_INCLUDE_DIR=/usr/x86_64-w64-mingw32/include/AL

      - name: Build
        run: cmake --build build-win -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist/torch-windows
          cp build-win/torch.exe build-win/torch_server.exe dist/torch-windows/
          cp /usr/x86_64-w64-mingw32/bin/SDL3.dll dist/torch-windows/ 2>/dev/null || true
          cp -r data dist/torch-windows/
          zip -r torch-windows.zip dist/torch-windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: torch-windows
          path: torch-windows.zip

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y -qq clang-tidy

      - name: Run clang-tidy
        run: clang-tidy src/*.cpp src/**/*.cpp -- -Isrc 2>&1 || true
